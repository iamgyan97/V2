<section class="page-section">
    <h2>संपर्क करें</h2>
    <p>
        कोई प्रश्न, साझेदारी का विचार, या बस नमस्ते कहना चाहते हैं?
        नीचे दिए गए विवरण या फॉर्म का उपयोग करें।
    </p>
    <p>
        <strong>ईमेल:</strong> info@nepashyafoundation.com<br>
        <strong>स्थान:</strong> भारत
    </p>

    <form class="volunteer-form" action="https://formspree.io/f/mzdladkb" method="POST">
        <label for="name">पूरा नाम</label>
        <input type="text" id="name" name="name" placeholder="आपका पूरा नाम">

        <label for="email">ईमेल पता</label>
        <input type="email" id="email" name="email" placeholder="you@example.com">

        <label for="message">आपका संदेश</label>
        <textarea id="message" name="message" rows="4" placeholder="यहाँ अपना संदेश लिखें"></textarea>

        <button type="submit">भेजें (अभी सक्रिय नहीं)</button>
    </form>
